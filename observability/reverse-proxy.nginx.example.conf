# Example for Nginx on 192.168.1.4 proxying to the observability host (e.g. 192.168.1.61).
# Copy snippets into server blocks under http { } on the proxy machine, obtain TLS
# certs (Let's Encrypt), and point DNS A/AAAA records for *.studio-colorbox.com to 192.168.1.4.
#
# Upstream: single VM running docker compose from observability/docker-compose.yml
#   Grafana :3000  Loki :3100  MCP :8001

# --- Grafana ---
server {
    listen 443 ssl http2;
    server_name aigm-grafana.studio-colorbox.com;

    ssl_certificate     /etc/letsencrypt/live/aigm-grafana.studio-colorbox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigm-grafana.studio-colorbox.com/privkey.pem;

    location / {
        proxy_pass http://192.168.1.61:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}

# --- Loki (HTTP API + push; increase body for large batches) ---
server {
    listen 443 ssl http2;
    server_name aigm-loki.studio-colorbox.com;

    ssl_certificate     /etc/letsencrypt/live/aigm-loki.studio-colorbox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigm-loki.studio-colorbox.com/privkey.pem;

    client_max_body_size 32m;

    location / {
        proxy_pass http://192.168.1.61:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# --- MCP (Perplexity / Streamable HTTP) ---
server {
    listen 443 ssl http2;
    server_name aigm-mcp.studio-colorbox.com;

    ssl_certificate     /etc/letsencrypt/live/aigm-mcp.studio-colorbox.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigm-mcp.studio-colorbox.com/privkey.pem;

    location / {
        proxy_pass http://192.168.1.61:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
