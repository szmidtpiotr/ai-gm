services:
  loki:
    image: grafana/loki:3.1.1
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-data:/tmp
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.5
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-now}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # Host path (SQLite snapshot for story panels + MCP). Override if you cannot use /var/lib/ai-gm-db.
      - ${AI_GM_STORY_DB_DIR:-/var/lib/ai-gm-db}:/var/lib/ai-gm-db:ro
    ports:
      - "3000:3000"
    depends_on:
      - loki
    restart: unless-stopped

  mcp-server:
    build:
      context: ./mcp
    environment:
      - LOKI_URL=http://loki:3100
      - STORY_DB_PATH=/var/lib/ai-gm-db/ai_gm.db
      - PORT=8001
    volumes:
      - ${AI_GM_STORY_DB_DIR:-/var/lib/ai-gm-db}:/var/lib/ai-gm-db:ro
    ports:
      - "8001:8001"
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki-data:
  promtail-data:
  grafana-data:
