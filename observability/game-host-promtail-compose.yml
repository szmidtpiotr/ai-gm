# Use only when the game Docker stack runs on a **different** machine than the
# observability compose (observability/docker-compose.yml already ships Promtail
# + Loki together). Edit game-host-promtail.yml → clients.url to your Loki base
# (e.g. http://192.168.1.61:3100/loki/api/v1/push).
services:
  game-host-promtail:
    image: grafana/promtail:3.1.1
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped
    volumes:
      - ./game-host-promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - game-host-promtail-data:/tmp
    ports:
      - "127.0.0.1:9081:9081"

volumes:
  game-host-promtail-data:
