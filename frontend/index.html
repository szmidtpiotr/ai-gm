<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI-GM</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title" id="app-title">AI-GM</div>
    </div>

    <div class="statusbar">
      <div class="status-card" id="status-backend">Backend: ...</div>
      <div class="status-card" id="status-ollama">Ollama: ...</div>
      <div class="status-card" id="status-models">Modele: ...</div>
      <div class="status-card" id="status-host">Host: ...</div>
    </div>

    <div class="controls">
      <div class="field">
        <label for="campaign-select" id="label-campaign">Kampania</label>
        <div class="field-row">
          <select id="campaign-select"></select>
          <button type="button" class="secondary" id="create-campaign-btn">Nowa</button>
          <button type="button" class="danger" id="delete-campaign-btn">Usuń</button>
        </div>
      </div>

      <div class="field">
        <label for="character-select" id="label-character">Postać</label>
        <div class="field-row">
          <select id="character-select"></select>
          <button type="button" class="secondary" id="create-character-btn">Nowa</button>
          <button type="button" class="secondary" id="history-btn">Historia</button>
        </div>
      </div>

      <div class="field">
        <label for="system-select" id="label-system">System</label>
        <select id="system-select">
          <option value="fantasy">fantasy</option>
          <option value="warhammer">warhammer</option>
          <option value="cyberpunk">cyberpunk</option>
          <option value="neuroshima">neuroshima</option>
        </select>
      </div>

      <div class="field">
        <label for="engine-select" id="label-engine">Silnik</label>
        <select id="engine-select"></select>
      </div>
    </div>

    <div class="field">
      <label for="ollama-url" id="label-ollama-url">Ollama Host</label>
      <div class="field-row single-action">
        <input id="ollama-url" placeholder="http://ollama:11434" value="http://ollama:11434">
        <button type="button" class="secondary" id="test-ollama-btn">Test</button>
      </div>
    </div>

    <!-- Thinking bubble is inserted here dynamically by ui.js -->
    <div class="chat" id="chat"></div>

    <div class="chat history-panel" id="history-panel">
      <div class="muted">Historia kampanii...</div>
    </div>

    <div class="composer">
      <textarea id="input" placeholder="Wpisz /sheet albo opisz akcję..."></textarea>
      <button type="button" class="secondary" id="dice-btn">🎲</button>
      <button type="button" id="send-btn">Wyślij</button>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/state.js"></script>
  <script src="./js/utils.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/actions.js"></script>
  <script src="./js/events.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
