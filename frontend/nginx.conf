server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — re-resolve `backend` on each request so nginx does not keep a
    # stale container IP after `docker compose restart backend` (otherwise persistent 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Explicit types so ES modules are always served as JavaScript MIME.
    # Browsers refuse to import modules if the Content-Type is not a JS MIME.
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js mjs;
        application/json                      json;
        image/svg+xml                         svg svgz;
        image/png                             png;
        image/jpeg                            jpg jpeg;
        image/gif                             gif;
        image/webp                            webp;
        image/x-icon                          ico;
        font/woff2                            woff2;
        font/woff                             woff;
        application/octet-stream              bin;
    }
    default_type application/octet-stream;

    # API endpoints with extended timeouts for slow model generations
    location /api/ {
        set $ai_gm_backend http://backend:8000;
        proxy_pass $ai_gm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE FIX: disable BOTH request AND response buffering.
        # proxy_request_buffering off = don't buffer the POST body (was already set).
        # proxy_buffering off         = don't buffer the SSE response — send each
        #                               token chunk to the browser immediately.
        # Without proxy_buffering off nginx holds the entire stream in memory and
        # only flushes it when the connection closes, causing the "dumps all at
        # once after a long wait" problem.
        proxy_request_buffering off;
        proxy_buffering off;

        # Extended timeouts for slow LLM generation
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, X-Ollama-Base-Url';
            return 204;
        }
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location /gm/ {
        set $ai_gm_backend http://backend:8000;
        proxy_pass $ai_gm_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;
        proxy_request_buffering off;
        proxy_buffering off;

        # Extended timeouts for slow LLM generation
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # CORS preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Ollama-Base-Url';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }

        # CORS headers for all responses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OVERVIEW' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        alias /usr/share/nginx/html/admin_panel/;
        try_files $uri $uri/ /admin_panel/index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location = /panel {
        return 301 /panel/;
    }

    location /panel/ {
        alias /usr/share/nginx/html/admin_panel/;
        try_files $uri $uri/ /admin_panel/index.html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location /admin_panel/ {
        # root + clean URI is safer than alias+try_files=404 on HEAD requests.
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Do NOT force Content-Type here — it makes .js/.css get served as text/html,
        # which breaks ES module imports and CSS loading. MIME is handled by `types` above.
        add_header Cache-Control "no-store, must-revalidate" always;
    }
}
