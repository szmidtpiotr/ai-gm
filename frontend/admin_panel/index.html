<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-GM Admin Panel</title>
    <link rel="stylesheet" href="/admin_panel/layout.css?v=7" />
  </head>
  <body>
    <div class="admin-shell">
      <aside class="admin-sidebar">
        <h1 class="sidebar-title">AI-GM Admin</h1>
        <nav class="sidebar-nav" id="sidebar-nav">
          <button type="button" data-section="game-design" class="active">
            <span class="nav-icon">🎲</span>
            <span class="nav-label">Game Design</span>
          </button>
          <button type="button" data-section="accounts">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Accounts</span>
          </button>
          <button type="button" data-section="technical">
            <span class="nav-icon">⚙️</span>
            <span class="nav-label">Technical</span>
          </button>
          <button type="button" data-section="config">
            <span class="nav-icon">💾</span>
            <span class="nav-label">Config</span>
          </button>
        </nav>
      </aside>

      <main class="admin-main">
        <header class="top-bar">
          <h1 class="top-bar-title">AI-GM Admin Panel</h1>
          <div class="top-bar-actions">
            <span id="connection-badge" class="status-badge">
              <span class="status-dot"></span>
              <span id="connection-label">Disconnected</span>
            </span>
            <button id="logout-btn" class="logout-btn" type="button">Logout</button>
          </div>
        </header>

        <section class="sections">
          <div class="section-panel active" data-section="game-design" aria-busy="true"></div>
          <div class="section-panel" data-section="accounts" aria-busy="true"></div>
          <div class="section-panel" data-section="technical" aria-busy="true"></div>
          <div class="section-panel" data-section="config" aria-busy="true"></div>
        </section>

        <div class="activity-log-wrap">
          <details class="activity-log">
            <summary>Activity Log</summary>
            <pre id="activity-log-pre"></pre>
          </details>
        </div>
      </main>
    </div>

    <div id="login-overlay" class="login-overlay visible">
      <div class="login-modal">
        <h2>Connect to Admin API</h2>
        <div class="field">
          <label for="api-base-url">API Base URL</label>
          <input id="api-base-url" type="url" placeholder="http://localhost:8080" />
        </div>
        <div class="field">
          <label for="bearer-token">Bearer Token</label>
          <input id="bearer-token" type="password" placeholder="Paste token here" />
        </div>

        <details class="advanced-box">
          <summary>Advanced (Dev Login)</summary>
          <div class="dev-login-row">
            <div class="field">
              <label for="dev-username">Username</label>
              <input id="dev-username" type="text" autocomplete="username" />
            </div>
            <div class="field">
              <label for="dev-password">Password</label>
              <input id="dev-password" type="password" autocomplete="current-password" />
            </div>
            <button id="dev-login-btn" class="secondary-btn" type="button">Generate Token</button>
          </div>
        </details>

        <div class="login-actions">
          <button id="connect-btn" class="primary-btn" type="button">Connect</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { adminFetch } from "/admin_panel/shared/api.js";
      import { autoConnect, connect, getBaseUrl, isConnected, logout } from "/admin_panel/shared/auth.js";
      import { showToast } from "/admin_panel/shared/toast.js";

      const overlay = document.getElementById("login-overlay");
      const logoutBtn = document.getElementById("logout-btn");
      const connectBtn = document.getElementById("connect-btn");
      const devLoginBtn = document.getElementById("dev-login-btn");
      const apiBaseUrlInput = document.getElementById("api-base-url");
      const tokenInput = document.getElementById("bearer-token");
      const devUsernameInput = document.getElementById("dev-username");
      const devPasswordInput = document.getElementById("dev-password");
      const connectionBadge = document.getElementById("connection-badge");
      const connectionLabel = document.getElementById("connection-label");
      const activityLog = document.getElementById("activity-log-pre");

      function appendLog(text) {
        const current = activityLog.textContent ? `${activityLog.textContent}\n` : "";
        activityLog.textContent = `${current}${text}`;
        activityLog.scrollTop = activityLog.scrollHeight;
      }

      function timestamp() {
        return new Date().toLocaleString();
      }

      function updateConnectionUI(connected) {
        overlay.classList.toggle("visible", !connected);
        connectionBadge.classList.toggle("connected", connected);
        connectionLabel.textContent = connected ? "Connected" : "Disconnected";
        logoutBtn.disabled = !connected;
      }

      async function handleConnect() {
        const baseUrl = apiBaseUrlInput.value.trim();
        const token = tokenInput.value.trim();

        try {
          await connect(baseUrl, token);
          updateConnectionUI(true);
          showToast("Connected successfully.", "success");
          appendLog(`[${timestamp()}] Connected to ${baseUrl}`);
        } catch (error) {
          updateConnectionUI(false);
          showToast(error.message || "Connection failed.", "error");
          appendLog(`[${timestamp()}] Connection failed`);
        }
      }

      async function handleDevLogin() {
        const baseUrl = apiBaseUrlInput.value.trim();
        const username = devUsernameInput.value.trim();
        const password = devPasswordInput.value;

        if (!baseUrl || !username || !password) {
          showToast("Provide base URL, username, and password.", "info");
          return;
        }

        const endpoint = `${baseUrl.replace(/\/+$/, "")}/api/admin/dev-login`;

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          let body = null;
          try {
            body = await response.json();
          } catch (_parseErr) {
            body = null;
          }
          if (!response.ok || !body || !body.token) {
            const detail =
              body && typeof body.detail === "string"
                ? body.detail
                : body && Array.isArray(body.detail)
                  ? body.detail.join("; ")
                  : `HTTP ${response.status}`;
            throw new Error(detail || "Dev login failed.");
          }

          tokenInput.value = body.token;
          showToast("Token generated from dev login.", "success");
          appendLog(`[${timestamp()}] Generated token via dev login`);
        } catch (error) {
          showToast(error.message || "Dev login failed.", "error");
          appendLog(`[${timestamp()}] Dev login failed`);
        }
      }

      let gameDesignReady = false;
      let accountsReady = false;
      let technicalReady = false;
      let configReady = false;

      async function maybeInitGameDesign(section) {
        if (section !== "game-design" || gameDesignReady) {
          return;
        }
        const el = document.querySelector('.section-panel[data-section="game-design"]');
        if (!el) {
          return;
        }
        gameDesignReady = true;
        try {
          const { init } = await import("/admin_panel/sections/game_design.js");
          await init(el);
        } catch (err) {
          gameDesignReady = false;
          showToast(err.message || "Game Design failed to load.", "error");
        }
      }

      async function maybeInitAccounts(section) {
        if (section !== "accounts" || accountsReady) {
          return;
        }
        const el = document.querySelector('.section-panel[data-section="accounts"]');
        if (!el) {
          return;
        }
        accountsReady = true;
        try {
          const { init } = await import("/admin_panel/sections/accounts.js");
          await init(el);
        } catch (err) {
          accountsReady = false;
          showToast(err.message || "Accounts failed to load.", "error");
        }
      }

      async function maybeInitTechnical(section) {
        if (section !== "technical" || technicalReady) {
          return;
        }
        const el = document.querySelector('.section-panel[data-section="technical"]');
        if (!el) {
          return;
        }
        technicalReady = true;
        try {
          const { init } = await import("/admin_panel/sections/technical.js");
          await init(el);
        } catch (err) {
          technicalReady = false;
          showToast(err.message || "Technical section failed to load.", "error");
        }
      }

      async function maybeInitConfig(section) {
        if (section !== "config" || configReady) {
          return;
        }
        const el = document.querySelector('.section-panel[data-section="config"]');
        if (!el) {
          return;
        }
        configReady = true;
        try {
          const { init } = await import("/admin_panel/sections/config.js");
          await init(el);
        } catch (err) {
          configReady = false;
          showToast(err.message || "Config section failed to load.", "error");
        }
      }

      function wireSidebarNav() {
        const navButtons = Array.from(document.querySelectorAll("#sidebar-nav button"));
        const panels = Array.from(document.querySelectorAll(".section-panel"));

        navButtons.forEach((button) => {
          button.addEventListener("click", () => {
            const selected = button.dataset.section;

            navButtons.forEach((entry) => {
              entry.classList.toggle("active", entry === button);
            });

            panels.forEach((panel) => {
              panel.classList.toggle("active", panel.dataset.section === selected);
            });

            void maybeInitGameDesign(selected);
            void maybeInitAccounts(selected);
            void maybeInitTechnical(selected);
            void maybeInitConfig(selected);
          });
        });
      }

      document.addEventListener("DOMContentLoaded", async () => {
        apiBaseUrlInput.value = getBaseUrl() || window.location.origin;

        const connected = await autoConnect();
        updateConnectionUI(connected && isConnected());
        appendLog(`[${timestamp()}] Admin panel initialized`);

        connectBtn?.addEventListener("click", handleConnect);
        devLoginBtn?.addEventListener("click", handleDevLogin);
        logoutBtn?.addEventListener("click", logout);
        wireSidebarNav();
        const activePanel = document.querySelector(".section-panel.active");
        if (activePanel && activePanel.dataset.section === "game-design") {
          void maybeInitGameDesign("game-design");
        }
      });

      window.addEventListener("admin-fetch", (event) => {
        const detail = event.detail || {};
        appendLog(
          `[${timestamp()}] ${detail.method || "GET"} ${detail.path || "-"} -> ${detail.status || 0} ${detail.ok ? "OK" : "ERR"}`,
        );
      });

      window.adminFetch = adminFetch;
    </script>
  </body>
</html>
