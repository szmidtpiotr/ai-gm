name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Opis wdrożenia"
        required: true
        default: "Manual production deploy"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run promote + deploy on server
        run: |
          ssh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            'cd /home/piotrszmidt/ai-gm && ./scripts/promote_and_deploy_prod.sh "${{ github.event.inputs.release_note }}"'
