name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Opis wdrozenia (widoczny w historii releasow)"
        required: true
        default: "Manual production deploy"

jobs:
  deploy:
    name: Promote and deploy on self-hosted .61
    runs-on: [self-hosted, linux, x64, prod-deploy]
    environment: production
    timeout-minutes: 30
    steps:
      - name: Verify deploy repository exists
        run: |
          test -d /home/piotrszmidt/ai-gm
          test -x /home/piotrszmidt/ai-gm/scripts/promote_and_deploy_prod.sh

      - name: Run promote and deploy script locally
        run: |
          cd /home/piotrszmidt/ai-gm
          ./scripts/promote_and_deploy_prod.sh "${{ github.event.inputs.release_note }}"
