name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      release_note:
        description: "Opis wdrozenia (widoczny w historii releasow)"
        required: true
        default: "Manual production deploy"

jobs:
  deploy:
    name: Promote and deploy on .61
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Run promote and deploy script on server
        run: |
          ssh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" \
            'cd /home/piotrszmidt/ai-gm && ./scripts/promote_and_deploy_prod.sh "${{ github.event.inputs.release_note }}"'
