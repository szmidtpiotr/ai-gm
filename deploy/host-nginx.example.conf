# Example fragments when AI-GM runs as Docker on the host and an outer nginx terminates TLS.
# Symptom: 502 on https://YOUR_DOMAIN/api/... — upstream (FastAPI) is down or wrong address.
#
# 1) From the host, verify backend responds:
#    curl -sS http://127.0.0.1:8000/api/healthz
# 2) If that works but https://YOUR_DOMAIN/api/healthz returns 502, fix the proxy_pass target below.

upstream ai_gm_fastapi {
    # Docker published port (see docker-compose.yml backend ports "8000:8000")
    server 127.0.0.1:8000;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name aigm-prod.studio-colorbox.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location /api/ {
        proxy_pass http://ai_gm_fastapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 120s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Static UI from the frontend container (port 3001 mapped to nginx:80 inside that image)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
